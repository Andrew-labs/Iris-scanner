[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Generous timeout: image generation can take 10-30s. Netlify free tier caps
# synchronous functions at 10s, but ours return immediately (async pattern),
# so this is fine. The poll function is near-instant.
[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate-iris"
  status = 200

[[redirects]]
  from = "/api/poll"
  to = "/.netlify/functions/poll-iris"
  status = 200
